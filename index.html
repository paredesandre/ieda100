<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>IDEA - Menu Principal</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            background: linear-gradient(135deg,#0d6efd,#6ea8fe);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .menu-card{
            background:#fff;
            border-radius:20px;
            padding:40px;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
            max-width:700px;
            width:100%;
        }

        .menu-title{
            font-size:2rem;
            font-weight:bold;
            color:#0d6efd;
        }

        .btn-menu{
            height:70px;
            font-size:1.2rem;
            font-weight:600;
            border-radius:12px;
            transition:.3s;
        }

        .btn-menu:hover{
            transform:translateY(-3px);
            box-shadow:0 10px 20px rgba(0,0,0,.2);
        }
    </style>
</head>
<body>

<div class="menu-card">

    <div class="text-center mb-4">
        <h1 class="menu-title">
            <i class="bi bi-grid-fill"></i>
            Página Ieda Tavares
        </h1>
        <p class="text-muted">
            Selecione uma das opções abaixo
        </p>
    </div>

    <div class="d-grid gap-3">

        <a href="ieda1.html" class="btn btn-primary btn-menu">
            <i class="bi bi-file-earmark-text"></i>
            Página 1
        </a>

        <a href="ieda2.html" class="btn btn-success btn-menu">
            <i class="bi bi-bar-chart"></i>
            Página 2
        </a>

        <a href="ieda3.html" class="btn btn-warning btn-menu text-dark">
            <i class="bi bi-people-fill"></i>
            Página 3
        </a>

        <a href="ieda4.html" class="btn btn-danger btn-menu">
            <i class="bi bi-gear-fill"></i>
            Página 4
        </a>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
